name: college_reality_india
description: "India's Best College Review Platform - Know the Reality Before You Take Admission."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_generator: ^2.4.0
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.1
  firebase_auth_platform_interface: ^7.7.3
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.3
  cached_network_image: ^3.3.1
  crypto: ^3.0.3
  file_picker: ^8.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.0.0
  animations: ^2.0.11
  smooth_page_indicator: ^1.2.0
  email_validator: ^2.1.17
  share_plus: ^10.1.4
  pdf: ^3.11.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: assets/icons/app_icon.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#1E3A8A"
  image: assets/icons/app_icon.png
  android_12:
    color: "#1E3A8A"
    image: assets/icons/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/data/