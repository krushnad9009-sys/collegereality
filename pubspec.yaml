name: college_reality_india
description: "India's Best College Review Platform - Know the Reality Before You Take Admission."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_generator: ^2.4.0
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.1
  firebase_auth_platform_interface: ^7.7.3
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2
  google_sign_in: ^6.2.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  crypto: ^3.0.3
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.0.0
  animations: ^2.0.11
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0
  email_validator: ^2.1.17
  logger: ^2.4.0
  sentry_flutter: ^8.4.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  build_runner: ^2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/onboarding/
    - assets/data/
