name: college_reality_india
description: "India's Best College Review Platform - Know the Reality Before You Take Admission."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Navigation
  go_router: ^14.2.0
  
  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_generator: ^2.4.0
  
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2
  
  # Authentication UI
  google_sign_in: ^6.2.1
  
  # Networking & HTTP
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Loading
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  
  # Validation & Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Animations
  animations: ^2.0.11
  lottie: ^3.1.2
  
  # Logging & Error Handling
  logger: ^2.4.0
  sentry_flutter: ^8.4.0
  
  # Code Generation
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator_cli: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/onboarding/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
